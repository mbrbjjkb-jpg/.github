name: 投資信託価格 毎日自動巡回・記録システム

on:
  schedule:
    # 毎日日本時間 21:30（基準価額が完全に確定した後の時間）に自動起動（UTC 12:30）
    - cron: '30 12 * * *'
  workflow_dispatch: # GitHubの管理画面から、いつでも手動でボタンを押して即時実行させる機能

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリ内のファイルをダウンロード（展開）
    - name: コードのチェックアウト
      uses: actions/checkout@v3

    # 2. Python環境をクラウド上にセットアップ
    - name: Python環境のセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    # 3. 動作に必要な解析ライブラリ（requests、BeautifulSoup4）をインストール
    - name: 依存ライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. 自動取得スクリプトの実行（fainanceフォルダ内で実行するように指定）
    - name: 最新の価格データを取得
      run: python update_daily_prices.py
      working-directory: fainance

    # 5. fainance/prices_daily.json に変更（追記）があった場合のみ、自動コミットしてGitHubにプッシュ（上書き保存）
    - name: 変更があった場合はリポジトリを自動更新
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add fainance/prices_daily.json
        if ! git diff-index --quiet HEAD --; then
          git commit -m "【自動記録】最新の価格データを prices_daily.json に自動追記しました"
          git push
        else
          echo "本日のデータはすでに記録済みの、または差分がないため自動プッシュをスキップします。"
        fi